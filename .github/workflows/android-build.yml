name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - 'buildrun.txt'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.11.1

      - name: Fix settings.gradle and build
        run: |
          # ---------------------------
          # 1. إصلاح settings.gradle الفارغ
          # ---------------------------
          if [ ! -s settings.gradle ] && [ ! -s settings.gradle.kts ]; then
            echo "الملف settings.gradle فارغ أو مفقود. سنقوم بإنشاء محتواه."
            cat > settings.gradle << 'EOF'
rootProject.name = "however"
include ':app'
EOF
            echo "✅ تم إنشاء settings.gradle مع include ':app'"
          fi
          
          # عرض محتوى settings.gradle للتأكد
          echo "=== محتوى settings.gradle ==="
          cat settings.gradle || cat settings.gradle.kts

          # ---------------------------
          # 2. إنشاء Gradle wrapper إذا لم يكن موجوداً
          # ---------------------------
          if [ ! -f gradlew ]; then
            echo "Gradle wrapper غير موجود، سيتم إنشاؤه..."
            gradle wrapper --gradle-version 8.11.1
            chmod +x gradlew
          fi

          # ---------------------------
          # 3. تشغيل سكريبت إزالة التكرارات (الذي أرفقته)
          # ---------------------------
          echo "تشغيل أداة إصلاح تكرارات الموارد..."
          python3 -c "
import os
import xml.etree.ElementTree as ET

def fix_duplicates():
    base_path = os.path.join('app', 'src', 'main', 'res', 'values')
    colors_path = os.path.join(base_path, 'colors.xml')
    styles_path = os.path.join(base_path, 'styles.xml')
    themes_path = os.path.join(base_path, 'themes.xml')

    print('=== بدء فحص وإصلاح ملفات الموارد ===')
    color_names_in_colors = set()
    if os.path.exists(colors_path):
        try:
            tree = ET.parse(colors_path)
            root = tree.getroot()
            for color in root.findall('color'):
                name = color.get('name')
                if name:
                    color_names_in_colors.add(name)
            print(f'[معلومة] تم العثور على {len(color_names_in_colors)} لون في colors.xml')
        except Exception as e:
            print(f'[خطأ] تعذر قراءة colors.xml: {e}')
    else:
        print('[تحذير] colors.xml غير موجود')

    if os.path.exists(styles_path):
        try:
            ET.register_namespace('tools', 'http://schemas.android.com/tools')
            tree = ET.parse(styles_path)
            root = tree.getroot()
            removed_colors_count = 0
            removed_themes_count = 0
            elements_to_remove = []
            for color in root.findall('color'):
                name = color.get('name')
                if name in color_names_in_colors:
                    elements_to_remove.append(color)
                    removed_colors_count += 1
            if os.path.exists(themes_path):
                for style in root.findall('style'):
                    if style.get('name') == 'AppTheme':
                        elements_to_remove.append(style)
                        removed_themes_count += 1
            for elem in elements_to_remove:
                root.remove(elem)
            if removed_colors_count > 0 or removed_themes_count > 0:
                tree.write(styles_path, encoding='utf-8', xml_declaration=True)
                print(f'[نجاح] تم تحديث styles.xml: حذف {removed_colors_count} لون و {removed_themes_count} ثيم')
            else:
                print('[معلومة] styles.xml لا يحتوي على تكرارات')
        except Exception as e:
            print(f'[خطأ] أثناء تعديل styles.xml: {e}')
    else:
        print('[تحذير] styles.xml غير موجود')
    print('=== انتهت العملية بنجاح ===')

if __name__ == '__main__':
    if os.path.exists('app'):
        fix_duplicates()
    else:
        print('[خطأ] مجلد app غير موجود')
"

          # ---------------------------
          # 4. بناء APK
          # ---------------------------
          echo "بدء بناء APK..."
          ./gradlew :app:assembleDebug --no-daemon

          # ---------------------------
          # 5. جمع APK الناتج
          # ---------------------------
          mkdir -p apk-artifacts
          find . -path "*/app/build/outputs/apk/debug/*.apk" -exec cp {} apk-artifacts/ \;
          if [ -z "$(ls -A apk-artifacts/ 2>/dev/null)" ]; then
            echo "::error::❌ لم يتم العثور على APK - فشل البناء"
            exit 1
          fi
          echo "✅ تم العثور على APK:"
          ls -la apk-artifacts/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MhasbMali-Debug-APK
          path: apk-artifacts/*.apk
