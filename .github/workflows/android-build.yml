name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - 'buildrun.txt'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.11.1

      - name: Build with Gradle
        run: |
          # 1. Find the real Android project directory (where settings.gradle[.kts] exists)
          PROJECT_DIR=""
          for d in $(find . -name "settings.gradle" -o -name "settings.gradle.kts" | xargs dirname | sort -u); do
            # Check if there is at least one module with com.android.application
            if find "$d" -name "build.gradle" -o -name "build.gradle.kts" | xargs grep -l "com.android.application" >/dev/null 2>&1; then
              PROJECT_DIR="$d"
              break
            fi
          done

          if [ -z "$PROJECT_DIR" ]; then
            echo "ERROR: Could not find Android project directory with settings.gradle and an application module."
            exit 1
          fi

          echo "Found Android project at: $PROJECT_DIR"
          cd "$PROJECT_DIR"

          # 2. Ensure gradle.properties has AndroidX and Jetifier
          if [ ! -f gradle.properties ]; then
            touch gradle.properties
          fi
          if ! grep -q "android.useAndroidX" gradle.properties; then
            echo "" >> gradle.properties
            echo "android.useAndroidX=true" >> gradle.properties
            echo "android.enableJetifier=true" >> gradle.properties
          else
            sed -i 's/android.useAndroidX=false/android.useAndroidX=true/g' gradle.properties
          fi
          if ! grep -q "android.enableJetifier" gradle.properties; then
            echo "android.enableJetifier=true" >> gradle.properties
          fi

          # 3. Generate Gradle wrapper if needed (using detected version from existing wrapper or default)
          TARGET_GRADLE_VERSION="8.11.1"
          if [ -f gradle/wrapper/gradle-wrapper.properties ]; then
            WRAPPER_VERSION=$(grep "distributionUrl" gradle/wrapper/gradle-wrapper.properties | sed -n 's/.*gradle-\([0-9.]*\)-.*/\1/p')
            if [ -n "$WRAPPER_VERSION" ]; then
              TARGET_GRADLE_VERSION="$WRAPPER_VERSION"
            fi
          fi
          if [ ! -f gradlew ]; then
            echo "Generating Gradle wrapper with version $TARGET_GRADLE_VERSION"
            gradle wrapper --gradle-version "$TARGET_GRADLE_VERSION"
          fi

          # 4. Run Python resource deduplicator (fix duplicate XML definitions)
          echo "Running resource deduplicator..."
          python3 -c "
import os
import xml.etree.ElementTree as ET

res_values_dirs = []
for root, dirs, files in os.walk('.'):
    if 'res/values' in root.replace('\\\\', '/'):
        res_values_dirs.append(root)

for res_dir in res_values_dirs:
    print(f'Cleaning duplicates in: {res_dir}')
    priorities = {
        'color': 'colors.xml',
        'string': 'strings.xml',
        'style': 'themes.xml',
        'dimen': 'dimens.xml'
    }
    files_data = {}
    if os.path.exists(res_dir):
        xml_files = [f for f in os.listdir(res_dir) if f.endswith('.xml')]
    else:
        xml_files = []
    for f in xml_files:
        path = os.path.join(res_dir, f)
        try:
            tree = ET.parse(path)
            files_data[f] = (tree, tree.getroot())
        except Exception as e:
            print(f'Error parsing {f}: {e}')
    seen = {}
    # First pass: register items from priority files
    for f, (tree, root_elem) in files_data.items():
        for child in list(root_elem):
            name = child.attrib.get('name')
            if not name:
                continue
            tag = child.tag
            priority_file = priorities.get(tag)
            if priority_file == f:
                seen[(tag, name)] = f
    # Second pass: remove duplicates
    for f, (tree, root_elem) in list(files_data.items()):
        modified = False
        for child in list(root_elem):
            name = child.attrib.get('name')
            if not name:
                continue
            tag = child.tag
            key = (tag, name)
            if key in seen:
                if seen[key] != f:
                    print(f'Removing duplicate {tag} \"{name}\" from {f} (already in {seen[key]})')
                    root_elem.remove(child)
                    modified = True
            else:
                seen[key] = f
        if modified:
            try:
                tree.write(os.path.join(res_dir, f), encoding='utf-8', xml_declaration=True)
            except Exception as e:
                print(f'Failed to write {f}: {e}')
"

          # 5. Build debug APK
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

          # 6. Collect all generated APKs
          cd "${GITHUB_WORKSPACE}"
          mkdir -p apk-artifacts
          find "$PROJECT_DIR" -name "*.apk" -type f -exec cp {} apk-artifacts/ \;
          echo "APK files copied to apk-artifacts:"
          ls -la apk-artifacts/ || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MhasbMali-Debug-APK
          path: apk-artifacts/*.apk
