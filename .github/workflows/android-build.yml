name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - 'buildrun.txt'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.11.1

      - name: Build with Gradle
        run: |
          # --- 1. البحث الذكي عن جذر مشروع Android ---
          # نبحث عن المجلد الذي يحتوي على settings.gradle (أو settings.gradle.kts) و app/build.gradle
          PROJECT_ROOT=""
          if [ -f "settings.gradle" ] || [ -f "settings.gradle.kts" ]; then
            PROJECT_ROOT="."
          else
            # البحث في المجلدات الفرعية عن settings.gradle
            for d in $(find . -name "settings.gradle" -o -name "settings.gradle.kts" | xargs dirname); do
              if [ -f "$d/app/build.gradle" ] || [ -f "$d/app/build.gradle.kts" ]; then
                PROJECT_ROOT="$d"
                break
              fi
            done
          fi
          
          if [ -z "$PROJECT_ROOT" ]; then
            echo "::error::Could not find Android project root (no settings.gradle and app/build.gradle found)."
            exit 1
          fi
          
          echo "Found Android project at: $PROJECT_ROOT"
          cd "$PROJECT_ROOT"
          
          # عرض محتويات المجلد للتأكد
          echo "Contents of project root:"
          ls -la
          
          # --- 2. إعداد gradle.properties (AndroidX و Jetifier) ---
          if [ ! -f gradle.properties ]; then
            touch gradle.properties
          fi
          if ! grep -q "android.useAndroidX" gradle.properties; then
            echo "" >> gradle.properties
            echo "android.useAndroidX=true" >> gradle.properties
            echo "android.enableJetifier=true" >> gradle.properties
          else
            sed -i 's/android.useAndroidX=false/android.useAndroidX=true/g' gradle.properties
          fi
          if ! grep -q "android.enableJetifier" gradle.properties; then
            echo "android.enableJetifier=true" >> gradle.properties
          fi

          # --- 3. التحقق من ملفات Gradle Wrapper وإنشاؤها إذا لزم الأمر ---
          TARGET_GRADLE_VERSION="8.11.1"
          if [ -f gradle/wrapper/gradle-wrapper.properties ]; then
            WRAPPER_VERSION=$(grep "distributionUrl" gradle/wrapper/gradle-wrapper.properties | sed -n 's/.*gradle-\([0-9.]*\)-.*/\1/p')
            if [ -n "$WRAPPER_VERSION" ]; then
              TARGET_GRADLE_VERSION="$WRAPPER_VERSION"
              echo "Found wrapper version: $TARGET_GRADLE_VERSION"
            fi
          fi

          if [ ! -f gradlew ]; then
            echo "Gradlew not found. Generating wrapper with version $TARGET_GRADLE_VERSION"
            gradle wrapper --gradle-version "$TARGET_GRADLE_VERSION"
            chmod +x gradlew
          fi

          # --- 4. أداة إزالة تكرارات الموارد ---
          echo "Running resource deduplicator..."
          python3 -c "
import os
import xml.etree.ElementTree as ET

res_values_dirs = []
for root, dirs, files in os.walk('.'):
    if 'res/values' in root.replace('\\\\', '/'):
        res_values_dirs.append(root)

for res_dir in res_values_dirs:
    print(f'Cleaning duplicates in: {res_dir}')
    priorities = {
        'color': 'colors.xml',
        'string': 'strings.xml',
        'style': 'themes.xml',
        'dimen': 'dimens.xml'
    }
    files_data = {}
    if os.path.exists(res_dir):
        xml_files = [f for f in os.listdir(res_dir) if f.endswith('.xml')]
    else:
        xml_files = []
    for f in xml_files:
        path = os.path.join(res_dir, f)
        try:
            tree = ET.parse(path)
            files_data[f] = (tree, tree.getroot())
        except Exception as e:
            print(f'Error parsing {f}: {e}')
    seen = {}
    # First pass: register items from priority files
    for f, (tree, root_elem) in files_data.items():
        for child in list(root_elem):
            name = child.attrib.get('name')
            if not name:
                continue
            tag = child.tag
            priority_file = priorities.get(tag)
            if priority_file == f:
                seen[(tag, name)] = f
    # Second pass: remove duplicates
    for f, (tree, root_elem) in list(files_data.items()):
        modified = False
        for child in list(root_elem):
            name = child.attrib.get('name')
            if not name:
                continue
            tag = child.tag
            key = (tag, name)
            if key in seen:
                if seen[key] != f:
                    print(f'Removing duplicate {tag} \"{name}\" from {f} (already in {seen[key]})')
                    root_elem.remove(child)
                    modified = True
            else:
                seen[key] = f
        if modified:
            try:
                tree.write(os.path.join(res_dir, f), encoding='utf-8', xml_declaration=True)
            except Exception as e:
                print(f'Failed to write {f}: {e}')
"

          # --- 5. بناء APK ---
          ./gradlew assembleDebug --no-daemon

          # --- 6. جمع APK الناتج ---
          cd "${GITHUB_WORKSPACE}"
          mkdir -p apk-artifacts
          find "$PROJECT_ROOT" -name "*.apk" -type f -exec cp {} apk-artifacts/ \;
          echo "APK files copied to apk-artifacts:"
          ls -la apk-artifacts/ || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MhasbMali-Debug-APK
          path: apk-artifacts/*.apk
