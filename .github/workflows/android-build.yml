name: Build Android APK

on:
  workflow_dispatch:  # يمكنك تشغيله يدوياً
  push:
    branches: [ "main" ]
    paths:
      - 'buildrun.txt'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle (with wrapper generation)
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.11.1

      - name: Build Android APK
        run: |
          # ----------------------------------------------
          # 1. البحث عن جذر مشروع Android (المجلد الذي يحتوي على settings.gradle)
          # ----------------------------------------------
          PROJECT_ROOT=""
          for d in $(find . -name "settings.gradle" -o -name "settings.gradle.kts" | xargs dirname | sort -u); do
            echo "🔍 checking: $d"
            # تحقق من وجود ملف build.gradle يطبق com.android.application داخل أي مجلد فرعي (مثل app)
            if find "$d" -maxdepth 2 -name "build.gradle" -o -name "build.gradle.kts" | xargs grep -l "com.android.application" >/dev/null 2>&1; then
              PROJECT_ROOT="$d"
              echo "✅ Found Android project at: $PROJECT_ROOT"
              break
            fi
          done

          if [ -z "$PROJECT_ROOT" ]; then
            echo "::error::❌ لم يتم العثور على مشروع Android صالح (يحتوي على settings.gradle و com.android.application)."
            exit 1
          fi

          cd "$PROJECT_ROOT"

          # ----------------------------------------------
          # 2. التأكد من وجود gradlew وتوليده إذا لزم الأمر
          # ----------------------------------------------
          if [ ! -f gradlew ]; then
            echo "📦 Gradle wrapper not found. Generating with version 8.11.1..."
            gradle wrapper --gradle-version 8.11.1
            chmod +x gradlew
          fi

          # ----------------------------------------------
          # 3. تشغيل مهمة بناء APK (نستخدم :app:assembleDebug أو أول وحدة تطبيق)
          # ----------------------------------------------
          # البحث عن مسار وحدة التطبيق (مثل app أو android/app ...)
          APP_MODULE_PATH=$(find . -name "build.gradle" -o -name "build.gradle.kts" | xargs grep -l "com.android.application" | head -1 | xargs dirname | sed 's|^\./||')
          
          if [ -n "$APP_MODULE_PATH" ]; then
            echo "📱 Found application module at: $APP_MODULE_PATH"
            TASK_NAME=":$APP_MODULE_PATH:assembleDebug"
            echo "🚀 Running: ./gradlew $TASK_NAME"
            ./gradlew $TASK_NAME --no-daemon
          else
            echo "::warning::⚠️ لم يتم العثور على وحدة تطبيق محددة. سنحاول استخدام assembleDebug الافتراضية."
            ./gradlew assembleDebug --no-daemon
          fi

          # ----------------------------------------------
          # 4. جمع ملفات APK الناتجة (بغض النظر عن مكانها)
          # ----------------------------------------------
          cd "$GITHUB_WORKSPACE"
          mkdir -p apk-artifacts
          find "$PROJECT_ROOT" -name "*.apk" -type f -exec cp {} apk-artifacts/ \;
          
          if [ -z "$(ls -A apk-artifacts/)" ]; then
            echo "::error::❌ لم يتم العثور على أي ملف APK بعد البناء."
            exit 1
          fi
          
          echo "✅ تم نسخ ملفات APK:"
          ls -la apk-artifacts/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MhasbMali-Debug-APK
          path: apk-artifacts/*.apk
