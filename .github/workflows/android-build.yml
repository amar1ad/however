name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - 'buildrun.txt'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.11.1

      - name: Fix settings.gradle and build APK
        run: |
          # ----------------------------------------------
          # 1. إصلاح ملف settings.gradle إذا كان فارغاً أو مفقوداً
          # ----------------------------------------------
          if [ ! -f settings.gradle ] && [ ! -f settings.gradle.kts ]; then
            echo "⚠️ settings.gradle غير موجود. سيتم إنشاؤه."
            echo "include ':app'" > settings.gradle
          elif [ ! -s settings.gradle ] && [ ! -s settings.gradle.kts ]; then
            echo "⚠️ settings.gradle موجود لكنه فارغ. سيتم إضافة المحتوى الأساسي."
            echo "include ':app'" > settings.gradle
          else
            echo "✅ settings.gradle موجود وغير فارغ."
            # تأكد من أنه يحتوي على include ':app' (أضفه إذا لم يكن موجوداً)
            if ! grep -q "include.*:app" settings.gradle 2>/dev/null && ! grep -q "include.*:app" settings.gradle.kts 2>/dev/null; then
              echo "⚠️ settings.gradle لا يحتوي على 'include ':app''. سيتم إضافته."
              echo "" >> settings.gradle
              echo "include ':app'" >> settings.gradle
            fi
          fi

          echo "=== محتوى settings.gradle بعد الإصلاح ==="
          cat settings.gradle 2>/dev/null || cat settings.gradle.kts 2>/dev/null

          # ----------------------------------------------
          # 2. إنشاء gradlew إذا لم يكن موجوداً
          # ----------------------------------------------
          if [ ! -f gradlew ]; then
            echo "📦 Gradle wrapper not found. Generating with version 8.11.1..."
            gradle wrapper --gradle-version 8.11.1
            chmod +x gradlew
          fi

          # ----------------------------------------------
          # 3. بناء APK (مباشرة باستخدام :app:assembleDebug)
          # ----------------------------------------------
          echo "🚀 Building APK..."
          ./gradlew :app:assembleDebug --no-daemon

          # ----------------------------------------------
          # 4. جمع ملف APK الناتج
          # ----------------------------------------------
          mkdir -p apk-artifacts
          find . -path "*/app/build/outputs/apk/debug/*.apk" -exec cp {} apk-artifacts/ \;

          if [ -z "$(ls -A apk-artifacts/)" ]; then
            echo "::error::❌ لم يتم العثور على ملف APK بعد البناء."
            exit 1
          fi
          echo "✅ تم نسخ ملفات APK:"
          ls -la apk-artifacts/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MhasbMali-Debug-APK
          path: apk-artifacts/*.apk
